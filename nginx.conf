# ─── KurumiMail — Nginx Reverse Proxy Config ─────────────────────────────────
# Đặt file này tại: /etc/nginx/sites-available/kurumi-mail
# Kích hoạt: ln -s /etc/nginx/sites-available/kurumi-mail /etc/nginx/sites-enabled/
# SSL:        certbot --nginx -d kurumi.vn -d www.kurumi.vn
# Reload:     nginx -t && systemctl reload nginx

# ─── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name kurumi.vn www.kurumi.vn hopthu.vn mailtam.vn nhanh.vn;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://kurumi.vn$request_uri;
    }
}

# ─── Main HTTPS server ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kurumi.vn www.kurumi.vn;

    # SSL (do certbot manage)
    ssl_certificate     /etc/letsencrypt/live/kurumi.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kurumi.vn/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (bổ sung cho helmet)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Gzip (bổ sung cho compression middleware)
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Upload limit (cho email attachments)
    client_max_body_size 10M;

    # ── Reverse proxy tới Node.js ──────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Static assets — long cache ─────────────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host $host;
        expires            7d;
        add_header         Cache-Control "public, immutable";
    }

    # ── Block sensitive files ──────────────────────────────────────────────
    location ~ /\.(env|git|gitignore|npmrc) {
        deny all;
        return 404;
    }
}

# ─── Other domains → redirect to main domain ─────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hopthu.vn mailtam.vn nhanh.vn;

    ssl_certificate     /etc/letsencrypt/live/kurumi.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kurumi.vn/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;

    return 301 https://kurumi.vn$request_uri;
}
