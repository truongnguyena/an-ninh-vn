<!doctype html>
<html lang="vi" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>KurumiMail — Email tạm thời dùng một lần miễn phí & ẩn danh</title>
    <meta name="title" content="KurumiMail — Email tạm thời dùng một lần miễn phí & ẩn danh" />
    <meta name="description" content="KurumiMail cung cấp địa chỉ email tạm thời miễn phí, tức thì và ẩn danh. Không cần đăng ký. Tự động xóa sau 30 phút. Giải pháp hoàn hảo để tránh spam và bảo vệ quyền riêng tư." />
    <meta name="keywords" content="email tam thoi, temporary email, mail 10 phut, mail ao, disposable email, spam filter, kurumi mail" />
    <meta name="author" content="Kurumi Team" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kurumi.vn/" />
    <meta property="og:title" content="KurumiMail — Email tạm thời dùng một lần miễn phí" />
    <meta property="og:description" content="Nhận địa chỉ email tạm thời ẩn danh ngay lập tức. Bảo vệ email thật khỏi spam và quảng cáo phiền nhiễu." />
    <meta property="og:image" content="https://kurumi.vn/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://kurumi.vn/" />
    <meta property="twitter:title" content="KurumiMail — Email tạm thời dùng một lần" />
    <meta property="twitter:description" content="Nhận địa chỉ email tạm thời ẩn danh ngay lập tức. Bảo vệ email thật khỏi spam." />
    <meta property="twitter:image" content="https://kurumi.vn/og-image.png" />

    <meta name="theme-color" content="#0a0a12" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%23d946ef'/><path d='M20 35c0-2.2 1.8-4 4-4h52c2.2 0 4 1.8 4 4v30c0 2.2-1.8 4-4 4H24c-2.2 0-4-1.8-4-4V35z' fill='white'/><path d='M20 35l30 18 30-18' stroke='%23d946ef' stroke-width='6' fill='none'/></svg>" />
    
    <style>
      /* Splash screen styles */
      #initial-loader {
        position: fixed;
        inset: 0;
        background: #0a0a12;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      .loader-content {
        text-align: center;
      }
      .loader-logo {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #d946ef, #7c3aed);
        border-radius: 18px;
        margin: 0 auto 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 30px rgba(217, 70, 239, 0.4);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div class="loader-content">
        <div class="loader-logo">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
            <path d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
          </svg>
        </div>
        <p style="color: #64748b; font-size: 14px; font-family: sans-serif;">Đang khởi tạo KurumiMail...</p>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      // Remove loader when app is ready
      window.addEventListener('load', () => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }
      });
    </script>
  </body>
</html>
